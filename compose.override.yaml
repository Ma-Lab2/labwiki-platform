services:
  assistant_api:
    environment:
      ASSISTANT_WIKI_URL: https://host.docker.internal:8443
      ASSISTANT_CORS_ALLOWED_ORIGINS: https://localhost:8443

  assistant_worker:
    environment:
      ASSISTANT_WIKI_URL: https://host.docker.internal:8443

  mw_public:
    environment:
      MW_SERVER: https://localhost

  mw_private:
    environment:
      MW_SERVER: https://localhost:8443

  caddy_public:
    environment:
      PUBLIC_HOST: localhost
    volumes:
      - ./ops/caddy/Caddyfile.public.local:/etc/caddy/Caddyfile:ro

  caddy_private:
    environment:
      PRIVATE_HOST: localhost
    volumes:
      - ./ops/caddy/Caddyfile.private.local:/etc/caddy/Caddyfile:ro
