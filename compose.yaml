name: labwiki-platform

x-default-logging: &default-logging
  driver: local

services:
  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --binlog-format=ROW
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
    secrets:
      - db_root_password
      - public_db_password
      - private_db_password
    volumes:
      - db_data:/var/lib/mysql
      - ./ops/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -uroot -p$$(cat /run/secrets/db_root_password) --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    logging: *default-logging

  mw_public:
    image: labwiki-platform-mw_public:latest
    build:
      context: .
      dockerfile: images/mediawiki-app/Dockerfile
      target: mw-runtime
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MW_DB_TYPE: mysql
      MW_DB_SERVER: mariadb
      MW_DB_NAME: labwiki_public
      MW_DB_USER: labwiki_public_user
      MW_DB_PASS_FILE: /run/secrets/public_db_password
      MW_CONFIG_FILE: /state/LocalSettings.php
      MW_ADMIN_USER: ${PUBLIC_ADMIN_USER:-admin}
      MW_ADMIN_PASS_FILE: /run/secrets/public_admin_password
      MW_SERVER: https://${PUBLIC_HOST:-lab.example.com}
      MW_SITE_NAME: ${PUBLIC_SITE_NAME:-课题组公开档案}
      MW_LANG: ${MW_LANG:-zh-cn}
      MW_PRIVATE_MODE: "false"
    secrets:
      - public_db_password
      - public_admin_password
    volumes:
      - ./state/public:/state
      - ./uploads/public:/var/www/html/images
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t && test -s /state/LocalSettings.php"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 40s
    logging: *default-logging

  mw_private:
    image: labwiki-platform-mw_private:latest
    build:
      context: .
      dockerfile: images/mediawiki-app/Dockerfile
      target: mw-runtime
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MW_DB_TYPE: mysql
      MW_DB_SERVER: mariadb
      MW_DB_NAME: labwiki_private
      MW_DB_USER: labwiki_private_user
      MW_DB_PASS_FILE: /run/secrets/private_db_password
      MW_CONFIG_FILE: /state/LocalSettings.php
      MW_ADMIN_USER: ${PRIVATE_ADMIN_USER:-admin}
      MW_ADMIN_PASS_FILE: /run/secrets/private_admin_password
      MW_SERVER: https://${PRIVATE_HOST:-wiki.lab.internal}
      MW_SITE_NAME: ${PRIVATE_SITE_NAME:-实验运行台账}
      MW_LANG: ${MW_LANG:-zh-cn}
      MW_PRIVATE_MODE: "true"
    secrets:
      - private_db_password
      - private_admin_password
    volumes:
      - ./state/private:/state
      - ./uploads/private:/var/www/html/images
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t && test -s /state/LocalSettings.php"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 40s
    logging: *default-logging

  rcf_backend:
    build:
      context: ./tools/rcf-web/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      CORS_ALLOWED_ORIGINS: https://${PRIVATE_HOST:-wiki.lab.internal},https://localhost:8443
      TASK_TTL_RUNNING_SEC: 21600
      TASK_TTL_DONE_SEC: 3600
      TASK_CLEANUP_INTERVAL_SEC: 60
    volumes:
      - ./state/rcf/uploaded_materials:/app/data/uploaded_materials
    logging: *default-logging

  rcf_frontend:
    build:
      context: ./tools/rcf-web/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      rcf_backend:
        condition: service_healthy
    volumes:
      - ./tools/rcf-web/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s
    logging: *default-logging

  tps_web:
    build:
      context: ./tools/pytps-web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PYTPS_DATA_DIR: /data/config
      PYTPS_IMAGE_DIR: /data/images
      PYTPS_OUTPUT_DIR: /data/output
      PYTPS_WORKERS: 4
      PYTPS_SESSION_MAX_AGE: 3600
    volumes:
      - ./state/tps:/data/config
      - ${TPS_IMAGE_DIR:-./tools-data/tps/images}:/data/images:ro
      - ./tools-data/tps/output:/data/output
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()",
        ]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 25s
    logging: *default-logging

  caddy_public:
    build:
      context: .
      dockerfile: images/mediawiki-app/Dockerfile
      target: caddy-runtime
    restart: unless-stopped
    depends_on:
      mw_public:
        condition: service_healthy
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:-lab.example.com}
      CADDY_EMAIL: ${CADDY_EMAIL:-admin@example.com}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/caddy/Caddyfile.public:/etc/caddy/Caddyfile:ro
      - ./uploads/public:/var/www/html/images
      - caddy_public_data:/data
      - caddy_public_config:/config
    logging: *default-logging

  caddy_private:
    build:
      context: .
      dockerfile: images/mediawiki-app/Dockerfile
      target: caddy-runtime
    restart: unless-stopped
    depends_on:
      mw_private:
        condition: service_healthy
      rcf_frontend:
        condition: service_healthy
      tps_web:
        condition: service_healthy
    environment:
      PRIVATE_HOST: ${PRIVATE_HOST:-wiki.lab.internal}
    ports:
      - "127.0.0.1:8443:443"
    volumes:
      - ./ops/caddy/Caddyfile.private:/etc/caddy/Caddyfile:ro
      - ./uploads/private:/var/www/html/images
      - caddy_private_data:/data
      - caddy_private_config:/config
    logging: *default-logging

secrets:
  db_root_password:
    file: ./secrets/db_root_password.txt
  public_db_password:
    file: ./secrets/public_db_password.txt
  private_db_password:
    file: ./secrets/private_db_password.txt
  public_admin_password:
    file: ./secrets/public_admin_password.txt
  private_admin_password:
    file: ./secrets/private_admin_password.txt

volumes:
  db_data:
  caddy_public_data:
  caddy_public_config:
  caddy_private_data:
  caddy_private_config:
